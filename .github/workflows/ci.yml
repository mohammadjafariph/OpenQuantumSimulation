name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  python-static:
    name: Python lint, typing, and unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Check publish-readiness file/package-data gate
        run: python scripts/check_publish_ready.py

      - name: Lint
        run: python -m ruff check openquantumsim examples tests scripts benchmarks README.md setup_julia.py

      - name: Type-check
        run: python -m mypy openquantumsim scripts/check_publish_ready.py setup_julia.py

      - name: Run non-backend Python tests
        run: python -m pytest tests -m "not physics and not integration and not slow"

  python-julia-integration:
    name: Python-Julia physics tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Instantiate Julia backend
        run: python setup_julia.py

      - name: Run Python physics tests
        run: python -m pytest tests/physics -m "physics"

  julia-backend:
    name: Julia backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Run Julia backend tests
        run: julia --project=src/OpenQuantumSimJL -e 'using Pkg; Pkg.test()'

  wheel-smoke:
    name: Wheel packaging smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel
        run: python -m pip wheel . --no-deps -w dist

      - name: Inspect wheel package data
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheel = next(Path("dist").glob("openquantumsim-*.whl"))
          names = set(zipfile.ZipFile(wheel).namelist())
          required = {
              "openquantumsim/py.typed",
              "openquantumsim/julia/OpenQuantumSimJL/Project.toml",
              "openquantumsim/julia/OpenQuantumSimJL/Manifest.toml",
              "openquantumsim/julia/OpenQuantumSimJL/src/OpenQuantumSimJL.jl",
              "openquantumsim/julia/OpenQuantumSimJL/test/runtests.jl",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"wheel is missing package data: {missing}")
          print(f"{wheel.name} includes packaged Julia backend")
          PY

      - name: Install wheel and check bundled backend path
        run: |
          python -m pip install --no-deps --target /tmp/oqs-wheel-install dist/openquantumsim-*.whl
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          module_path = Path("/tmp/oqs-wheel-install/openquantumsim/_julia_bridge.py")
          spec = importlib.util.spec_from_file_location("oqs_julia_bridge", module_path)
          if spec is None or spec.loader is None:
              raise SystemExit(f"could not load {module_path}")
          bridge = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(bridge)

          path = bridge.backend_path()
          assert str(path).startswith("/tmp/oqs-wheel-install/"), path
          assert (path / "Project.toml").is_file()
          assert (path / "src" / "OpenQuantumSimJL.jl").is_file()
          print(path)
          PY
