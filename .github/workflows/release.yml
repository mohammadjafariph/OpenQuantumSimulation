name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v0.1.0a0"
        required: true
        type: string
      publish_target:
        description: "Optional Python package index upload target"
        required: true
        default: "none"
        type: choice
        options:
          - "none"
          - "testpypi"
          - "pypi"

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build and check distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install release tooling
        run: python -m pip install ".[release]"

      - name: Check publish-readiness file/package-data gate
        run: python scripts/check_publish_ready.py

      - name: Build source and wheel distributions
        run: python -m build --outdir dist

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions-${{ env.RELEASE_TAG }}
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Create or update GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-${{ env.RELEASE_TAG }}
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "OpenQuantumSim $RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/openquantumsim/
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-${{ env.RELEASE_TAG }}
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target == 'pypi' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openquantumsim/
    permissions:
      actions: read
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-distributions-${{ env.RELEASE_TAG }}
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
